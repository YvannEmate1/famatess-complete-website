  <script>
    (function setDynamicDescription() {
      try {
        var lang = navigator.language || navigator.userLanguage;
        var metaDesc = document.querySelector('meta[name="description"]');
        var frText = "Famatess Company opère dans les secteurs de l'Automobile, de la Logistique et du BTP. Nous gérons votre chaîne logistique et vos projets d'infrastructure.";
        var enText = "Famatess Company specializes in Automobile, Logistics, and BTP. We manage your full supply chain and infrastructure projects.";
        var content = (lang && lang.toLowerCase().startsWith('fr')) ? frText : enText;
        if (metaDesc) metaDesc.setAttribute('content', content);
      } catch (e) { }
    })();
  </script>

  <link rel="manifest" href="/manifest.json" />
  <title>Famatess Company | Automobile, Logistics & BTP</title>
