<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/Assets/logo-no-bg.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" id="meta-description"
    content="Famatess Company offers a large range of services that goes from car sales and location to Logistics and Transport to Building and Public Works. We also manage your full supply chain from import to delivery, including heavy equipment and earthworks." />

  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="Famatess Company" />
  <meta property="og:description" id="og-description"
    content="Famatess Company offers a large range of services that goes from car sales and location to Logistics and Transport to Building and Public Works. We also manage your full supply chain from import to delivery, including heavy equipment and earthworks." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="%PUBLIC_URL%/Assets/logo-no-bg.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Famatess Company" />
  <meta name="twitter:description" id="twitter-description"
    content="Famatess Company offers a large range of services that goes from car sales and location to Logistics and Transport to Building and Public Works. We also manage your full supply chain from import to delivery, including heavy equipment and earthworks." />

  <script>
    (function setDynamicDescription() {
      try {
        var lang = navigator.language || navigator.userLanguage;
        var metaDesc = document.querySelector('meta[name="description"]');
        var ogDesc = document.querySelector('meta[property="og:description"]');
        var twDesc = document.querySelector('meta[name="twitter:description"]');

        var frText = "La société Famatess offre une large gamme de services allant de la vente et location de véhicules à la Logistique et au Transport, en passant par le Bâtiment et les Travaux Publics. Nous gérons également l'ensemble de votre chaîne logistique, de l'importation à la livraison, y compris les équipements lourds et les terrassements.";
        var enText = "Famatess Company offers a large range of services that goes from car sales and location to Logistics and Transport to Building and Public Works. We also manage your full supply chain from import to delivery, including heavy equipment and earthworks.";

        var content = (lang && lang.toLowerCase().startsWith('fr')) ? frText : enText;

        if (metaDesc) metaDesc.setAttribute('content', content);
        if (ogDesc) ogDesc.setAttribute('content', content);
        if (twDesc) twDesc.setAttribute('content', content);
      } catch (e) { }
    })();
  </script>
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/Assets/logo-no-bg.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>Famatess Company</title>
</head>
