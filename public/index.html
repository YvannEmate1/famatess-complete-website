  <script>
    /* Keeps your dynamic language switching for users while keeping static text for bots */
    (function setDynamicDescription() {
      try {
        var lang = navigator.language || navigator.userLanguage;
        var metaDesc = document.querySelector('meta[name="description"]');
        var frText = "Famatess Company opère dans les secteurs de Famatess Automobile, de la Logistique et du BTP. Nous gérons votre chaîne logistique et vos projets d'infrastructure.";
        var enText = "Famatess Company specializes in Famatess Automobile, Logistics, and BTP. We manage your full supply chain and infrastructure projects.";
        var content = (lang && lang.toLowerCase().startsWith('fr')) ? frText : enText;
        if (metaDesc) metaDesc.setAttribute('content', content);
      } catch (e) { }
    })();
  </script>
